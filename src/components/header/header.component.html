<header class="bg-white/80 backdrop-blur-lg sticky top-0 z-50 border-b border-gray-100">
  <nav class="container mx-auto px-6 py-4">
    <div class="flex items-center justify-between">
      <a routerLink="/" class="flex items-center space-x-3">
        <div class="w-3 h-3 bg-black"></div>
        <span class="font-display text-sm font-bold tracking-[0.2em] uppercase text-gray-900">IAEX Network</span>
      </a>
      
      <!-- Desktop Menu -->
      <div class="hidden md:flex items-center space-x-6">
        @for (link of navLinks; track link.path) {
          <a [routerLink]="link.path" routerLinkActive="text-black border-b-2 border-black" [routerLinkActiveOptions]="{exact: link.path === '/' }"
             class="text-sm font-medium text-gray-500 hover:text-black transition-colors duration-300 pb-1">
            {{ link.label }}
          </a>
        }
      </div>

      <!-- Mobile Menu Button -->
      <div class="md:hidden">
        <button (click)="toggleMenu()" class="text-gray-900 focus:outline-none">
          <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16m-7 6h7"></path>
          </svg>
        </button>
      </div>
    </div>
    
    <!-- Mobile Menu -->
    @if(isMenuOpen()) {
      <div class="md:hidden mt-4">
        <div class="flex flex-col space-y-4">
          @for (link of navLinks; track link.path) {
            <a [routerLink]="link.path" routerLinkActive="text-black bg-gray-100" [routerLinkActiveOptions]="{exact: link.path === '/'}" (click)="toggleMenu()"
               class="block px-4 py-2 text-sm font-medium text-gray-600 hover:bg-gray-100 hover:text-black rounded-lg transition-colors duration-300">
              {{ link.label }}
            </a>
          }
        </div>
      </div>
    }
  </nav>
</header>
